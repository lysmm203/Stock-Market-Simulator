<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <meta charset="UTF-8">
    <title>Stock Selection</title>
    <script src="https://code.jquery.com/jquery-3.6.3.js" integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'base/css/styles.css' %}">
    <link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script>
        $(function () {
            $("#user_input").autocomplete({
                source: function (request, response) {
                    // Send an AJAX request to the server to retrieve the source data
                    $.ajax({
                        type: 'GET',
                        url: "{% url 'autocomplete' %}",
                        dataType: "json",
                        data: {
                            term: request.term
                        },
                        success: function (data) {

                            // Filter the results to only include those that match the search term exactly
                            var matcher = new RegExp("^" + $.ui.autocomplete.escapeRegex(request.term), "i");
                            response($.map(data, function (value, key) {
                                if (matcher.test(value)){
                                    return key + ": " + value;
                                }
                            }));
                        }
                    });
                }
            });
        });
    </script>
</head>

<body>
{{request.session.money}}

<div class="container justify-content-center h-100">
    <div class="row">
        <div class="d-flex flex-column min-vh-100 justify-content-center align-items-center">
                <h1>Stock Selection</h1>
            <div class="dialogue-box">
                <form method="POST">
                    {% csrf_token %}
                    <div class="ui-widget">
                        <label for="user_input">Company: </label>
                        <input id="user_input" name="chosen_stock">
                    </div>

                    <div>
                        <label>Amount to Invest: </label>
                        <input type="number" name="investment_amount">
                    </div>

                    <div>
                        <input type="submit" value="Submit">
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
